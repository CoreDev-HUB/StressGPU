<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stress GPU by Enric-Xx & CodeDev.Hub</title>
    <style>
        /* CSS3 INTEGRADO: Controlamos la apariencia total */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* El canvas donde se ve el fractal */
        #c1 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* LA BARRA INFERIOR (Igual que tu captura) */
        #ui-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: rgba(10, 10, 10, 0.9);
            border-top: 2px solid #222;
            z-index: 10;
            display: flex;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        /* Consola de texto estilo Matrix */
        .console-box {
            flex-grow: 1;
            background: #050505;
            border: 1px solid #333;
            height: 80px;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        #kernel {
            background: transparent;
            border: none;
            color: #00ff41; /* Verde Matrix */
            font-family: 'Consolas', monospace;
            font-size: 13px;
            width: 100%;
            height: 100%;
            outline: none;
            resize: none;
        }

        /* Botón APPLY con brillo rojo */
        #apply {
            margin-left: 30px;
            background: transparent;
            border: 2px solid #ff4747;
            color: #ff4747;
            padding: 15px 35px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(255, 71, 71, 0.2);
        }

        #apply:hover {
            background: #ff4747;
            color: #fff;
            box-shadow: 0 0 25px rgba(255, 71, 71, 0.6);
        }

        /* Texto informativo a la derecha */
        .info-text {
            margin-left: 30px;
            color: #666;
            font-size: 11px;
            line-height: 1.5;
            min-width: 250px;
        }
    </style>
</head>
<body>

    <canvas id="c1"></canvas>

    <div id="ui-panel">
        <div class="console-box">
            <textarea id="kernel" spellcheck="false"></textarea>
        </div>

        <button id="apply">APPLY</button>

        <div class="info-text">
            ENGINE: WebGL Raymarching<br>
            PLATFORM: CoreDev-HUB // Enric-Xx<br>
            STATUS: <span style="color: #ff4747;">STRESSING GPU...</span>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
