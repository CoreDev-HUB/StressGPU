<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1.0">
    <title>GPU Stress Test | Enric-Xx & CoreDev-HUB</title>
    <style>
        /* CSS3: Aquí definimos el estilo visual de la interfaz */
        body {
            background: #0a0a0c; /* Fondo ultra oscuro */
            color: #ff4747;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        #c1 {
            position: fixed;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10; /* Por encima del canvas */
            background: rgba(15, 15, 20, 0.9);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #ff4747; /* Borde rojo neón */
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 71, 71, 0.2);
        }

        h1 {
            font-size: 20px;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 71, 71, 0.5);
        }

        .brand {
            font-size: 11px;
            letter-spacing: 1px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        button {
            background: #ff4747;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: #fff;
            color: #ff4747;
            box-shadow: 0 0 15px #ff4747;
        }

        #config {
            margin-top: 15px;
            display: none; /* Se muestra al dar a CONFIG */
        }

        textarea {
            background: #000;
            color: #00ff00; /* Texto tipo Matrix */
            border: 1px solid #444;
            font-family: 'Consolas', monospace;
            width: 300px;
            height: 150px;
            margin-bottom: 10px;
            border-radius: 4px;
            padding: 5px;
        }

        .status-box {
            margin-top: 15px;
            font-size: 12px;
            border-top: 1px solid #333;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <canvas id="c1"></canvas>

    <div id="ui-container">
        <h1>GPU STRESS TEST</h1>
        <div class="brand">COREDEV-HUB // ENRIC-XX</div>
        
        <button id="btn">Config Kernel</button>
        
        <div id="config">
            <textarea id="kernel"></textarea>
            <br>
            <button id="apply">Apply Tweak</button>
        </div>

        <div class="status-box">
            <span style="color: #888;">ENGINE:</span> WebGL Raymarching<br>
            <span style="color: #888;">TARGET:</span> RTX 4060 / i5-12400F
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
