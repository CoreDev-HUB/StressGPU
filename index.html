<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1.0">
    <title>GPU Stress Test | Enric-Xx & CoreDev-HUB</title>
    <style>
        /* =========================================
           CSS: Clonando la interfaz de la captura
           ========================================= */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Fondo negro absoluto */
            font-family: 'Consolas', 'Courier New', monospace; /* Fuente de código */
        }

        /* El lienzo del fractal ocupa toda la pantalla */
        #c1 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Contenedor principal de la UI (abajo) */
        #ui-main-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px; /* Altura de la consola */
            z-index: 10;
            background: rgba(10, 10, 12, 0.95); /* Fondo oscuro semitransparente */
            border-top: 1px solid #333;
            display: grid;
            grid-template-columns: 1fr auto; /* Texto a la izquierda, botón a la derecha */
            gap: 20px;
            padding: 15px 30px;
            box-sizing: border-box;
            backdrop-filter: blur(5px); /* Efecto cristal esmerilado */
        }

        /* Sección de la consola de texto */
        #console-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* El título de la consola */
        #console-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        /* El área de texto (El Kernel) */
        textarea {
            background: transparent;
            border: none;
            color: #0f0; /* Color Matrix */
            font-family: 'Consolas', monospace;
            font-size: 13px;
            width: 100%;
            height: 80px;
            resize: none;
            outline: none;
            padding: 0;
            margin: 0;
            line-height: 1.4;
        }

        /* Sección del botón */
        #button-section {
            display: flex;
            align-items: center;
            justify-content: center;
            padding-right: 20px;
        }

        /* Botón APPLY (estilo neón rojo) */
        #apply {
            background: transparent;
            border: 2px solid #ff4747;
            color: #ff4747;
            padding: 15px 40px;
            border-radius: 4px;
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 71, 71, 0.3);
        }

        #apply:hover {
            background: #ff4747;
            color: #fff;
            box-shadow: 0 0 25px rgba(255, 71, 71, 0.8);
            transform: scale(1.05);
        }

        /* Ocultamos el botón CONFIG viejo, ya no hace falta */
        #btn { display: none; }
        #config { display: block !important; }

    </style>
</head>
<body>

    <canvas id="c1"></canvas>

    <div id="ui-main-container">
        
        <div id="console-section">
            <div id="console-label">CoreDev-HUB // Kernel Console</div>
            <textarea id="kernel" spellcheck="false"></textarea>
        </div>

        <div id="button-section">
            <button id="apply">Apply</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
